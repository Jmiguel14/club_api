# PostgreSQL. Install libpq locally (e.g. `brew install libpq` on macOS) and ensure the `pg` gem is in the Gemfile.
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: club_development
  username: postgres
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: club_test
  username: <%= ENV["POSTGRES_USER"] %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>

# Production uses multiple databases for Solid Cache, Queue, and Cable.
# Set POSTGRES_USER, POSTGRES_PASSWORD, and POSTGRES_HOST (via Kamal secrets / env).
production:
  primary:
    <<: *default
    port: 6543
    database: <%= ENV["POSTGRES_DATABASE"] %>
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
    prepared_statements: false
  cache:
    <<: *default
    database: <%= ENV["POSTGRES_DATABASE"] %>
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV["POSTGRES_DATABASE"] %>
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV["POSTGRES_DATABASE"] %>
    username: <%= ENV["POSTGRES_USER"] %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
    migrations_paths: db/cable_migrate
